<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>claude-workspace-tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header>
    <h1>claude-workspace-tool</h1>
    <div class="status-badge" data-tip="reasoner status">
      <span id="status-led" class="led led-unknown"></span>
      <span id="status-label" class="status-label">—</span>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>

  <script>
    // Status LED: polls /health on load; flashes during HTMX requests.
    const led = document.getElementById('status-led');
    const label = document.getElementById('status-label');
    function setLed(state, text) {
      if (!led) return;
      led.className = 'led led-' + state;
      if (label && text !== undefined) label.textContent = text;
    }
    async function refreshHealth() {
      try {
        const r = await fetch('/health');
        if (!r.ok) { setLed('bad', 'reasoner: error'); return; }
        const j = await r.json();
        if (j.reasoner) setLed('ok', 'reasoner · ' + j.provider);
        else setLed('warn', 'reasoner off');
      } catch (e) { setLed('bad', 'connect fail'); }
    }
    refreshHealth();
    setInterval(refreshHealth, 30000);

    // Pulse LED during active HTMX work
    document.body.addEventListener('htmx:beforeRequest', () => setLed('busy', 'thinking…'));
    document.body.addEventListener('htmx:afterOnLoad', (ev) => {
      if (ev.detail.xhr.status < 400) refreshHealth();
      else setLed('bad', 'http ' + ev.detail.xhr.status);
    });
    document.body.addEventListener('htmx:responseError', (ev) => setLed('bad', 'http ' + ev.detail.xhr.status));
    document.body.addEventListener('htmx:sendError', () => setLed('bad', 'network err'));
  </script>
</body>
</html>
