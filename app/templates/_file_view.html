<div class="file-view" data-path="{{ path }}">
  <div class="file-view-header">
    <code class="file-path">{{ path }}</code>
    <button type="button" class="copy-btn" data-copy-text="{{ path }}">📋 path</button>
    <button type="button" class="copy-btn" data-copy-target="content-{{ path|replace('/', '_') }}">📋 content</button>
    <a class="vscode-link" href="vscode://file{{ path }}">VS Code</a>
  </div>
  <pre id="content-{{ path|replace('/', '_') }}" class="full-content">{{ content }}</pre>
  <form hx-post="/file" hx-target="next .save-result" hx-swap="innerHTML">
    <input type="hidden" name="path" value="{{ path }}">
    <textarea name="content" rows="14" spellcheck="false">{{ content }}</textarea>
    <div class="form-row">
      <button type="submit">Save</button>
      <span class="muted">Edits go to <code>{{ path }}</code> (whitelisted subdir + non-sensitive only).</span>
    </div>
  </form>
  <div class="save-result"></div>
</div>
